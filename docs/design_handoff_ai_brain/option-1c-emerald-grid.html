<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Option 1c — Emerald Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#090e0b;font-family:'Space Grotesk',system-ui,sans-serif}
  a{color:#5db6ff;text-decoration:none}a:hover{color:#ff9a4d}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<!-- Hero is a fixed 1440x820 design reference; make responsive in the real implementation -->
<div style="position:relative;width:1440px;height:820px;background:radial-gradient(800px 600px at 85% 30%, rgba(28,140,95,.12), transparent 62%),radial-gradient(600px 500px at 10% 10%, rgba(255,110,20,.06), transparent 60%),#090e0b;overflow:hidden">
  <div style="position:absolute;inset:0;background:repeating-linear-gradient(90deg, transparent 0 119px, rgba(47,191,143,.05) 119px 120px),repeating-linear-gradient(0deg, transparent 0 119px, rgba(47,191,143,.05) 119px 120px)"></div>
  <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:26px 48px;z-index:4">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:26px;height:26px;border:2px solid #2fbf8f;border-radius:4px;display:grid;place-items:center;font:700 13px 'IBM Plex Mono',monospace;color:#2fbf8f">K</div>
      <div style="font:600 14px 'Space Grotesk',sans-serif;color:#e9f5ee;letter-spacing:.12em">ALEX KERN</div>
    </div>
    <div style="display:flex;gap:32px;font:600 12px 'Space Grotesk',sans-serif;color:rgba(233,245,238,.6);letter-spacing:.14em">
      <span>PATH</span><span>BUILDS</span><span>SIGNAL</span><span style="color:#ff9a4d">TALK</span>
    </div>
  </div>
  <div style="position:absolute;right:-140px;top:-20px;width:880px;height:880px;z-index:1">
    <canvas id="brain-1c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  </div>
  <div style="position:absolute;left:48px;bottom:70px;width:700px;z-index:3;display:flex;flex-direction:column;gap:28px">
    <div style="display:flex;align-items:center;gap:12px;font:600 12px 'IBM Plex Mono',monospace;color:#2fbf8f;letter-spacing:.2em"><span style="width:34px;height:1px;background:#2fbf8f;display:inline-block"></span>DIGITAL ARCHITECTURE × APPLIED AI</div>
    <h1 style="margin:0;font:700 84px/.98 'Space Grotesk',sans-serif;color:#e9f5ee;letter-spacing:-.03em;text-transform:uppercase">Systems<br>that <span style="color:#ff7a1a;text-shadow:0 0 30px rgba(255,122,26,.4)">think.</span></h1>
    <p style="margin:0;font:400 17px/1.6 'Space Grotesk',sans-serif;color:rgba(233,245,238,.6);max-width:460px">Digital leader for organisations rewiring themselves around AI — architecture, agents, and the operating model to run them.</p>
    <div style="display:flex;gap:14px;align-items:center">
      <span style="font:700 14px 'Space Grotesk',sans-serif;letter-spacing:.1em;color:#090e0b;background:linear-gradient(90deg,#ff7a1a,#ff9a4d);border-radius:2px;padding:14px 28px">SEE THE WORK →</span>
      <span style="font:700 14px 'Space Grotesk',sans-serif;letter-spacing:.1em;color:#8ecbff;border:1px solid rgba(93,182,255,.4);border-radius:2px;padding:13px 26px">LET'S TALK</span>
    </div>
  </div>
</div>

<script src="brain-engine.js"></script>
<script src="brain-config-1c-emerald-grid.js"></script>
<script>
  createBrainMesh(document.getElementById('brain-1c'), BRAIN_CONFIG_1C);
</script>
</body>
</html>
