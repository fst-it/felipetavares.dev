<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

<!-- Hero is a fixed 1440x820 design reference; make responsive in the real implementation -->
<div style="position:relative;width:1440px;height:820px;background:radial-gradient(1000px 700px at 62% 40%, rgba(30,90,200,.13), transparent 62%),radial-gradient(500px 400px at 90% 85%, rgba(255,110,20,.07), transparent 60%),#070b14;overflow:hidden">

    <div style="display:flex;gap:30px;font:500 12.5px 'IBM Plex Mono',monospace;color:rgba(200,220,240,.6)">

    <div style="display:flex;gap:14px;margin-top:8px">

    <div style="display:flex;gap:26px;margin-top:10px;font:400 12px 'IBM Plex Mono',monospace;color:rgba(200,220,240,.42)">

      <span><span style="color:#ff9a4d">40+</span> systems live</span>
      <span><span style="color:#2fbf8f">7</span> agents in prod</span>

</div>
